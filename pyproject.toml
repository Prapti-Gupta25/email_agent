[project]
name = "email_agent"
version = "0.1.0"
description = "AI Email Management Agent for Meta PyTorch Hackathon"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "openenv-core",
    "openai",
    "python-dotenv",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
