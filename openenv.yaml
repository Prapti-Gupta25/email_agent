version: "1.0"
env_id: "email_triage_env"
description: >
  A real-world RL environment for AI-driven email management including 
  classification, prioritization, and routing.

entry_point: "email_triage_env.server.email_triage_env_environment:EmailTriageEnvironment"

# Define tasks for the automated grader
tasks:
  - id: "easy_classify"
    name: "Email Classification"
    difficulty: "easy"
  - id: "medium_priority"
    name: "Email Prioritization"
    difficulty: "medium"
  - id: "hard_triage"
    name: "Full Email Triage"
    difficulty: "hard"

# The validator uses these to check your API compliance
observation_space:
  type: "object"
  properties:
    emails:
      type: "array"
      items:
        type: "object"
        properties:
          id: {type: "integer"}
          subject: {type: "string"}
          body: {type: "string"}
    step_count: {type: "integer"}
    done: {type: "boolean"}

action_space:
  type: "object"
  properties:
    type: {type: "string", enum: ["classify", "prioritize", "triage"]}
    email_id: {type: "integer"}
    label: {type: "string", enum: ["spam", "important", "normal"]}
