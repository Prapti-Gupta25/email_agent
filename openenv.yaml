version: "1.0"
env_id: "email_triage_env"
description: >
  An RL environment for AI-driven email management including 
  classification, prioritization, and routing.

# Format: folder.subfolder.filename:ClassName
entry_point: "email_triage_env.server.email_triage_env_environment:EmailTriageEnvironment"

tasks:
  - id: "easy"
    name: "Email Classification"
    difficulty: "easy"
  - id: "medium"
    name: "Email Prioritization"
    difficulty: "medium"
  - id: "hard"
    name: "Full Email Triage"
    difficulty: "hard"

observation_space:
  type: "object"
  properties:
    emails:
      type: "array"
      items:
        type: "object"
        properties:
          id: {type: "integer"}
          subject: {type: "string"}
          body: {type: "string"}
    step_count: {type: "integer"}
    done: {type: "boolean"}

action_space:
  type: "object"
  properties:
    type: {type: "string", enum: ["classify", "prioritize", "triage"]}
    email_id: {type: "integer"}
    label: {type: "string", enum: ["spam", "important", "normal"]}
